<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shark Tank NN</title>
  <style>
    body { margin: 0; background: #071e28; font-family: ui-monospace, monospace; color: #eaf3f2; }
    .layout { display: flex; gap: 12px; padding: 12px; }
    #tank { background: linear-gradient(180deg, #0d3b4a, #071e28); border-radius: 8px; }
    #nnviz { background: #0a1a1f; border-radius: 8px; }
    #fitnessChart { background: #0a1a1f; border-radius: 8px; }
    #hud { display: flex; gap: 16px; padding: 8px 12px; font-size: 13px; flex-wrap: wrap; }
    #stageInfo { padding: 4px 12px 8px; font-size: 13px; line-height: 1.5; max-width: 700px; }
    #narrator { padding: 4px 12px 12px; font-size: 13px; line-height: 1.5; max-width: 700px; color: #bcd8d6; font-style: italic; }
    .side { display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>
  <div id="controls"></div>
  <div id="hud"></div>
  <div id="stageInfo"></div>
  <div id="narrator"></div>
  <div class="layout">
    <canvas id="tank" width="1000" height="600"></canvas>
    <div class="side">
      <canvas id="nnviz" width="360" height="440"></canvas>
      <canvas id="fitnessChart" width="360" height="140"></canvas>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
